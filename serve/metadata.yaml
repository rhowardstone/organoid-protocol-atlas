title: Organoid Protocol Atlas
extra_css_urls:
  - /static/atlas.css
description_html: >
  <p><strong>Evidence-grounded organoid culture protocols, extracted from the literature.</strong>
  Methods sections from a 25-paper PMC corpus, parsed into structured protocol records
  (source cells, matrix, base media, signaling cocktail) where every reagent links to a
  verbatim source span and a DOI. Extracted with a local model; evidence verified by
  exact-substring grounding.</p>
  <p>A <em>PaperStack</em> application — the science-paper sibling of CaseStack. Reagent
  rows carry short single-sentence citation snippets; full text is not redistributed.</p>
license: MIT
source: PMC Open Access + author-manuscript corpus (per-row license in the data)
databases:
  atlas:
    tables:
      protocols:
        title: Protocols (recipe cards)
        description_html: >
          <p>One row per paper: the extracted protocol header. <code>grounding_rate</code>
          is the fraction of signaling factors whose evidence quote is a verbatim substring
          of the source text.</p>
        label_column: pmcid
        sort_desc: grounding_rate
        facets: [organoid_type, source_cell_type, license, gold_candidate]
      reagents:
        title: Reagents (signaling factors & supplements)
        description_html: >
          <p>One row per extracted reagent. <code>kind</code> distinguishes signaling
          factors from viability supplements (the biological-bucketing axis). Each
          <code>evidence_quote</code> is a verbatim span from the source; <code>grounded=0</code>
          means the model's quote did not exactly match (kept honest, not hidden).</p>
        label_column: name
        facets: [organoid_type, kind, canonical, role, canonical_unit, grounded, suspect_unit, figure_confirmed]
        fts_table: reagents_fts
    queries:
      signaling_by_type:
        title: "Signaling factors by organoid type (with citations)"
        description: The core comparison — which morphogens define each organoid system, with evidence.
        sql: |
          SELECT organoid_type, canonical AS reagent, role, value, canonical_unit AS unit, doi, evidence_quote
          FROM reagents
          WHERE kind = 'signaling'
          ORDER BY organoid_type, canonical
      compare_reagent:
        title: "Compare one reagent across protocols"
        description: "Enter a reagent (e.g. EGF, CHIR99021, R-spondin) to see how its use/concentration varies."
        sql: |
          SELECT canonical AS reagent, organoid_type, value, canonical_unit AS unit, doi, evidence_quote
          FROM reagents
          WHERE kind = 'signaling' AND canonical LIKE '%' || :reagent || '%'
          ORDER BY canonical, organoid_type
      grounding_by_protocol:
        title: "Evidence-grounding coverage by protocol"
        description: How much of each protocol's signaling cocktail is verbatim-grounded.
        sql: |
          SELECT pmcid, organoid_type, doi, reagents_grounded, reagents_total, grounding_rate
          FROM protocols
          ORDER BY grounding_rate DESC
