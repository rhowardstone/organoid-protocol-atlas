{% extends "default:base.html" %}

{% block extra_head %}
{{ super() }}
<style>
/* ── Atlas sticky global navbar ── */
.apa-nav {
  background: var(--ink, #0f172a);
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.apa-nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  height: 46px;
}
.apa-nav-brand {
  font-family: var(--mono, "DM Mono", monospace);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.07em;
  color: #f5f5f5;
  text-decoration: none;
  white-space: nowrap;
  margin-right: 1.5rem;
  text-transform: uppercase;
  opacity: 0.92;
  transition: opacity 0.15s;
}
.apa-nav-brand:hover { opacity: 1; text-decoration: none; }
.apa-nav-brand .bdot { color: var(--accent, #0e7490); margin: 0 2px; }
.apa-nav-links {
  display: flex;
  align-items: center;
  flex: 1;
}
a.apa-nav-link {
  display: flex;
  align-items: center;
  height: 46px;
  padding: 0 0.65rem;
  font-size: 0.67rem;
  font-weight: 500;
  letter-spacing: 0.045em;
  color: rgba(245,245,245,0.65);
  text-decoration: none;
  text-transform: uppercase;
  font-family: var(--mono, monospace);
  transition: color 0.15s;
  white-space: nowrap;
}
a.apa-nav-link:hover { color: #f5f5f5; text-decoration: none; }
/* Search */
.apa-nav-search {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0;
}
.apa-nav-search form { display: flex; align-items: center; }
.apa-nav-search input {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 4px;
  color: #f5f5f5;
  font-family: var(--mono, monospace);
  font-size: 0.68rem;
  padding: 4px 8px;
  width: 130px;
  outline: none;
  transition: width 0.2s, border-color 0.15s;
  -webkit-appearance: none;
}
.apa-nav-search input:focus {
  width: 190px;
  border-color: var(--accent, #0e7490);
}
.apa-nav-search input::placeholder { color: rgba(245,245,245,0.28); }
.apa-nav-search button {
  background: none;
  border: none;
  color: rgba(245,245,245,0.35);
  cursor: pointer;
  padding: 4px 7px;
  font-size: 0.72rem;
  transition: color 0.15s;
}
.apa-nav-search button:hover { color: var(--accent, #0e7490); }
/* Mobile toggle */
.apa-nav-toggle {
  display: none;
  background: none;
  border: none;
  color: #f5f5f5;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: auto;
}
@media (max-width: 780px) {
  .apa-nav-search { display: none; }
  .apa-nav-toggle { display: block; }
  /* Hamburger toggles inline display:flex; render that as a vertical dropdown
     panel below the bar instead of a horizontal row that overflows the screen. */
  .apa-nav-links {
    display: none;
    position: absolute;
    top: 46px;
    left: 0;
    right: 0;
    flex-direction: column;
    align-items: stretch;
    background: var(--ink, #0f172a);
    border-bottom: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    padding: 0.25rem 0;
  }
  .apa-nav-links a.apa-nav-link { height: auto; padding: 0.7rem 1.25rem; }
}
/* Hide Datasette's default header (replaced by our nav) */
header.hd { display: none !important; }
/* Hide legacy apa-topbar inside page content — absorbed into this nav */
.apa-topbar { display: none !important; }
</style>
{% endblock %}

{% block nav %}
<nav class="apa-nav" role="navigation" aria-label="Site navigation">
  <div class="apa-nav-inner">
    <a href="/" class="apa-nav-brand">Organoid<span class="bdot">·</span>Protocol<span class="bdot">·</span>Atlas</a>
    <div class="apa-nav-links">
      <a href="/explore" class="apa-nav-link">Explore</a>
      <a href="/compare" class="apa-nav-link">Compare</a>
      <a href="/heatmap" class="apa-nav-link">Heatmap</a>
      <a href="/consensus" class="apa-nav-link">Consensus</a>
      <a href="/ask" class="apa-nav-link">Ask</a>
      <a href="/dashboard" class="apa-nav-link">Dashboard</a>
      <a href="/atlas/protocols" class="apa-nav-link">Protocols</a>
      <a href="/atlas/reagents" class="apa-nav-link">Reagents</a>
      <a href="/llms.txt" class="apa-nav-link">llms.txt</a>
      <a href="https://github.com/rhowardstone/organoid-protocol-atlas" class="apa-nav-link" target="_blank" rel="noopener">GitHub</a>
    </div>
    <div class="apa-nav-search">
      <form onsubmit="event.preventDefault();var q=this.querySelector('input').value.trim();if(q)window.location='/explore?q='+encodeURIComponent(q);">
        <input type="search" placeholder="Search protocols, factors…" aria-label="Search protocols and reagents">
        <button type="submit" aria-label="Search">&#9658;</button>
      </form>
    </div>
    <button class="apa-nav-toggle" aria-label="Open menu" onclick="this.closest('nav').querySelector('.apa-nav-links').style.display=this.closest('nav').querySelector('.apa-nav-links').style.display==='flex'?'none':'flex';">&#9776;</button>
  </div>
</nav>
{% endblock %}
