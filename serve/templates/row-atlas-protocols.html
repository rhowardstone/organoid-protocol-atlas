{% extends "base.html" %}
{% block title %}Protocol — Organoid Protocol Atlas{% endblock %}
{% block body_class %}index{% endblock %}

{% block content %}
<style>
.apa-review-warning {
  background: #fff8e1;
  border: 1px solid #f59e0b;
  border-radius: 8px;
  padding: .75rem 1rem;
  margin-bottom: 1rem;
  font-size: .88rem;
  line-height: 1.5;
}
.apa-review-warning a { color: var(--accent); }
.apa-rel-row { display:flex; flex-wrap:wrap; gap:.5rem; margin:.3rem 0 1.2rem; }
.apa-rel { display:flex; flex-direction:column; gap:.1rem; padding:.45rem .75rem; border:1px solid var(--border,#333); border-radius:6px; text-decoration:none; color:inherit; background:var(--paper,#111); min-width:130px; max-width:200px; flex:1; }
.apa-rel:hover { border-color:var(--accent,#4a9eff); }
.apa-rel-a { font-size:.82rem; font-weight:500; }
.apa-rel-m { font-size:.7rem; color:var(--muted,#888); }
/* ── Staged recipe (#178) ── */
.stg-block { margin: 1.2rem 0 .3rem; }
.stg-h3 { font-size: 1rem; margin: 0 0 .6rem; display: flex; align-items: center; gap: .5rem; }
.stg-tag { font-family: var(--mono); font-size: .6rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.stg-tag.derived { background: color-mix(in srgb, var(--muted) 18%, transparent); color: var(--muted); }
.stg-list { list-style: none; margin: 0; padding: 0; border-left: 2px solid var(--border); }
.stg-card { position: relative; padding: .15rem 0 .9rem 1rem; margin-left: .4rem; }
.stg-head { display: flex; align-items: baseline; gap: .5rem; flex-wrap: wrap; }
.stg-num { position: absolute; left: -.85rem; top: 0; width: 1.1rem; height: 1.1rem; border-radius: 50%; background: var(--accent); color: #fff; font-family: var(--mono); font-size: .66rem; line-height: 1.1rem; text-align: center; }
.stg-card.derived .stg-num { background: var(--muted); }
.stg-name { font-weight: 600; font-size: .9rem; }
.stg-day { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
.stg-meta { font-size: .75rem; color: var(--muted); margin: .2rem 0; }
.stg-reagents { display: flex; flex-wrap: wrap; gap: 5px; margin-top: .35rem; }
.stg-reagent { font-size: .76rem; font-family: var(--mono); padding: 1px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--paper-3); }
.stg-reagent i { color: var(--muted); font-style: normal; }
.stg-noreagent { font-size: .74rem; color: var(--muted); margin-top: .3rem; font-style: italic; }
.stg-transition { font-size: .72rem; font-family: var(--mono); color: var(--muted); margin-top: .35rem; opacity: .85; }
.stg-note { font-size: .78rem; color: var(--muted); margin: .5rem 0 0; }
.stg-note a { color: var(--accent); }
.stg-rawtl { font-size: .9rem; line-height: 1.6; }
</style>
<div class="apa-topbar">
  <span class="dot"></span> <a href="/">ORGANOID PROTOCOL ATLAS</a>
  <span class="dot"></span> <a href="/atlas/protocols">All protocols</a>
  <span class="dot"></span> <a href="/explore">Explore</a>
  <span class="dot"></span> <a href="/heatmap">Heatmap</a>
  <span class="dot"></span> <a href="/consensus">Consensus</a>
  <span class="dot"></span> <a href="/dashboard">Dashboard</a>
  <span class="dot"></span> <a href="/ask">Ask</a>
</div>

<div class="apa-recipe" id="recipe"><p style="color:var(--muted)">Loading protocol…</p></div>

<script>
const pmcid = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop());
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const j = async u => (await fetch(u)).json();

function conc(r){
  if(r.value==null && !r.unit) return '';
  const u = r.canonical_unit || r.unit || '';
  return `${r.value==null?'':r.value} ${u==='not stated'?'':u}`.trim();
}
function badge(g){ return g ? '<span class="apa-badge ok">grounded</span>' : '<span class="apa-badge no">ungrounded</span>'; }
function highlight(text, quotes){
  let html = esc(text);
  const uniq = [...new Set(quotes.filter(Boolean))].sort((a,b) => b.length - a.length);
  for (const q of uniq){ const eq = esc(q); html = html.split(eq).join('<mark class="apa-hl">'+eq+'</mark>'); }
  return html;
}

// ── Staged recipe (issue #178) ───────────────────────────────────────────────
function stageDose(r){
  const c = r.concentration;
  let val, unit;
  if(c && typeof c === 'object'){ val = c.value; unit = c.canonical_unit || c.unit; }
  else { val = c; unit = r.unit; }
  unit = (unit && unit !== 'not stated') ? unit : '';
  if(val == null && !unit) return '';
  return `${val == null ? '' : val} ${unit}`.trim();
}

function dayBadge(s){
  const a = s.start_day, b = s.end_day;
  if(a == null && b == null) return '';
  if(a != null && b != null) return a === b ? `Day ${a}` : `Day ${a}–${b}`;
  if(a != null) return `Day ${a}+`;
  return `→ Day ${b}`;
}

function stageCard(s, i){
  const day = dayBadge(s);
  const reags = (s.reagents || []).filter(r => r && r.name);
  const reagentHtml = reags.length
    ? `<div class="stg-reagents">${reags.map(r => {
        const d = stageDose(r), role = (r.role && r.role !== 'not stated') ? r.role : '';
        return `<span class="stg-reagent"><b>${esc(r.canonical_name || r.name)}</b>${d ? ` · ${esc(d)}` : ''}${role ? ` <i>${esc(role)}</i>` : ''}</span>`;
      }).join('')}</div>`
    : `<div class="stg-noreagent">no reagents added in this step</div>`;
  const meta = [s.medium_base && `medium: ${esc(s.medium_base)}`,
                s.culture_vessel && `vessel: ${esc(s.culture_vessel)}`].filter(Boolean).join(' · ');
  return `<li class="stg-card">
    <div class="stg-head"><span class="stg-num">${i+1}</span><span class="stg-name">${esc(s.name || 'stage')}</span>${day ? `<span class="stg-day">${esc(day)}</span>` : ''}</div>
    ${meta ? `<div class="stg-meta">${meta}</div>` : ''}
    ${reagentHtml}
    ${s.transition ? `<div class="stg-transition">→ ${esc(s.transition)}</div>` : ''}
  </li>`;
}

function parseTimeline(tl){
  if(!tl) return [];
  return tl.split(/\s*(?:→|->)\s*/).map(seg => {
    seg = seg.trim(); if(!seg) return null;
    const m = seg.match(/\(([^)]*\bd[^)]*)\)\s*$/i);
    if(m) return { name: seg.slice(0, m.index).trim(), day: m[1].trim() };
    return { name: seg, day: '' };
  }).filter(Boolean);
}

function renderStages(p){
  if(Array.isArray(p.stages) && p.stages.length){
    return `<div class="stg-block">
      <h3 class="stg-h3">Staged recipe <span class="stg-tag" title="Ordered stages extracted from the source protocol (schema v0.6, #178)">as extracted</span></h3>
      <ol class="stg-list">${p.stages.map(stageCard).join('')}</ol>
    </div>`;
  }
  if(p.is_generation_protocol === false){
    return `<div class="stg-block"><h3 class="stg-h3">Staged recipe</h3>
      <p class="stg-note">Not an organoid-generation protocol (organoids used as an assay) — no staged recipe was extracted.</p></div>`;
  }
  const steps = parseTimeline(p.timeline);
  if(steps.length >= 2){
    return `<div class="stg-block">
      <h3 class="stg-h3">Timeline <span class="stg-tag derived" title="Derived from the reported free-text timeline; per-stage reagents not yet extracted (#178)">derived</span></h3>
      <ol class="stg-list">${steps.map((s,i) => `<li class="stg-card derived">
        <div class="stg-head"><span class="stg-num">${i+1}</span><span class="stg-name">${esc(s.name || 'stage')}</span>${s.day ? `<span class="stg-day">${esc(s.day)}</span>` : ''}</div>
      </li>`).join('')}</ol>
      <p class="stg-note">Derived from the reported timeline — per-stage reagents are not yet broken out. <a href="https://github.com/rhowardstone/organoid-protocol-atlas/issues/178" target="_blank" rel="noopener">#178</a></p>
    </div>`;
  }
  if(p.timeline) return `<div class="stg-block"><h3 class="stg-h3">Timeline</h3><p class="stg-rawtl">${esc(p.timeline)}</p></div>`;
  return '';
}

function renderEndpoints(p){
  const e = p.assay_endpoints;
  if(!e || (Array.isArray(e) && !e.length)) return '';
  if(Array.isArray(e)){
    return `<div class="stg-block">
      <h3 class="stg-h3">Endpoints <span class="stg-tag derived">characterization</span></h3>
      <div class="stg-reagents">${e.filter(Boolean).map(x => `<span class="stg-reagent">${esc(x)}</span>`).join('')}</div>
      <p class="stg-note">Characterization readouts — not culture steps.</p>
    </div>`;
  }
  return `<p style="font-size:.9rem"><strong>Validation / endpoints:</strong> ${esc(e)}</p>`;
}

(async () => {
  let p, reags;
  try {
    [p] = await j(`/atlas/protocols/${encodeURIComponent(pmcid)}.json?_shape=array`);
    reags = await j(`/atlas/reagents.json?_shape=array&_size=300&pmcid=${encodeURIComponent(pmcid)}`);
  } catch (e) {
    document.getElementById('recipe').innerHTML = '<p>Could not load this protocol.</p>'; return;
  }
  // stages is a JSON-text column in the Datasette DB; the row API returns it as a
  // string. Normalize to an array so the recipe renderer (Array.isArray check) fires.
  if (typeof p.stages === 'string') { try { p.stages = JSON.parse(p.stages || '[]'); } catch (e) { p.stages = []; } }
  if (!Array.isArray(p.stages)) p.stages = [];
  let src = null;
  try { [src] = await j(`/atlas/sources/${encodeURIComponent(pmcid)}.json?_shape=array`); } catch (e) {}
  const sig = reags.filter(r => r.kind === 'signaling');
  const sup = reags.filter(r => r.kind === 'supplement');
  const sm  = reags.filter(r => r.kind === 'small_molecule');
  const cite = `<a href="${esc(AtlasCite.href(p))}" target="_blank" rel="noopener">${esc(AtlasCite.cleanDoi(p.doi)||p.pmcid||'source')}</a>`;
  const title = `${esc((p.organoid_type||'').toUpperCase())} organoid · ${esc(p.first_author||'')} ${esc(p.year||'')}`;
  const isReview = (p.publication_type || '').toLowerCase() === 'review';
  const cardLabel = isReview ? 'Review-derived summary' : 'Recipe card';
  const cocktailLabel = isReview
    ? `Cited study reagent/pathway mentions <span style="color:var(--muted);font-weight:400">(${sig.length}) — review article, not an executable protocol</span>`
    : `Signaling cocktail <span style="color:var(--muted);font-weight:400">(${sig.length})${sig.filter(r=>r.figure_confirmed).length?` · ${sig.filter(r=>r.figure_confirmed).length} 📷 confirmed in a figure schematic`:''}</span>`;
  const reviewBanner = isReview ? `<div class="apa-review-warning">
    ⚠ <strong>Review article</strong> — These entries are reagents and pathways <em>mentioned across multiple cited studies</em>, not components of a single executable protocol.
    The extractor was not designed to classify review-derived mentions from primary protocol steps.
    <a href="${esc(AtlasCite.href(p))}" target="_blank" rel="noopener">Verify source →</a>
  </div>` : '';

  const ax = [
    ['Organoid type', p.organoid_type],
    ['Source cells', `${esc(p.source_cell_type||'—')}${p.species?(' · '+esc(p.species)):''}`],
    ['Matrix', p.matrix || '—'],
    ['Base media', p.base_media || ('— ('+(p.base_media_reporting||'?')+')')],
    ['License', p.license || '—'],
    ['Grounding', (p.grounding_rate==null?'—':Math.round(p.grounding_rate*100)+'%')],
  ].map(([k,v]) => `<div class="ax"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('');

  const rows = sig.map(r => `
    <tr>
      <td><a href="/atlas/reagents?canonical__exact=${encodeURIComponent(r.canonical || r.name)}">${esc(r.name)}</a>${r.figure_confirmed ? ' <span class="apa-badge fig" title="also shown in this paper&apos;s figure schematic — confirmed by Tier-2 vision">📷 figure</span>' : ''}</td>
      <td>${esc(r.role==='not stated'?'':r.role)}</td>
      <td>${esc(conc(r))}${r.suspect_unit ? ' <span class="apa-badge no" title="implausible unit — likely extraction error">⚠</span>' : ''}</td>
      <td>${badge(r.grounded)}</td>
      <td class="quote">${r.evidence_quote?('"'+esc(r.evidence_quote)+'"'):''}</td>
    </tr>`).join('') || `<tr><td colspan="5" style="color:var(--muted)">No signaling factors extracted.</td></tr>`;

  document.getElementById('recipe').innerHTML = `
    ${reviewBanner}<div class="apa-kicker">${cardLabel} · ${esc(pmcid)}</div>
    <h1>${title}</h1>
    <p style="color:var(--muted);margin:.2rem 0 0">Source: ${cite}</p>
    <div class="apa-axes">${ax}</div>
    <h3 style="margin:1.2rem 0 .3rem">${cocktailLabel}</h3>
    <table class="apa-cocktail">
      <thead><tr><th>Reagent</th><th>Role</th><th>Conc.</th><th>Evidence</th><th>Verbatim span</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${renderStages(p)}
    ${p.passaging ? `<p style="font-size:.9rem"><strong>Passaging:</strong> ${esc(p.passaging)}</p>` : ''}
    ${renderEndpoints(p)}
    ${sup.length ? `<h3 style="margin:1.2rem 0 .3rem">Media supplements <span style="color:var(--muted);font-weight:400">(${sup.length})</span></h3>
      <p style="font-size:.9rem">${sup.map(r=>esc(r.name)).join(' · ')}</p>` : ''}
    ${sm.length ? `<h3 style="margin:1.2rem 0 .3rem">Small molecules <span style="color:var(--muted);font-weight:400">(${sm.length})</span></h3>
      <table class="apa-cocktail">
        <thead><tr><th>Reagent</th><th>Role</th><th>Conc.</th><th>Evidence</th><th>Verbatim span</th></tr></thead>
        <tbody>${sm.map(r => `
          <tr>
            <td><a href="/atlas/reagents?canonical__exact=${encodeURIComponent(r.canonical || r.name)}">${esc(r.name)}</a>${r.figure_confirmed ? ' <span class="apa-badge fig" title="confirmed in figure">📷 figure</span>' : ''}</td>
            <td>${esc(r.role==='not stated'?'':r.role)}</td>
            <td>${esc(conc(r))}${r.suspect_unit ? ' <span class="apa-badge no">⚠</span>' : ''}</td>
            <td>${badge(r.grounded)}</td>
            <td class="quote">${r.evidence_quote?('"'+esc(r.evidence_quote)+'"'):''}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : ''}
    ${p.organoid_type && p.organoid_type !== 'other' ? `
    <div style="margin-top:1.5rem;padding:1rem 1.2rem;background:var(--paper);border:1px solid var(--border);border-radius:10px;">
      <div style="font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem">Analytics for ${esc(p.organoid_type)} organoids</div>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;font-size:.82rem;">
        <a href="/analytics/consensus/${encodeURIComponent(p.organoid_type)}" style="color:var(--accent)">Consensus recipe →</a>
        <span style="color:var(--muted)">·</span>
        <a href="/analytics/coverage/${encodeURIComponent(p.organoid_type)}" style="color:var(--accent)">Coverage report →</a>
        <span style="color:var(--muted)">·</span>
        <a href="/ask?q=${encodeURIComponent('which signaling factors define ' + p.organoid_type + ' organoids?')}" style="color:var(--accent)">Ask about ${esc(p.organoid_type)} →</a>
      </div>
    </div>` : ''}
    <p style="margin-top:1rem"><a href="/atlas/protocols">← all protocols</a></p>
  `;

  if (src && src.methods_text) {
    const quotes = reags.filter(r => r.evidence_quote).map(r => r.evidence_quote);
    const lic = src.license ? (' · ' + esc(src.license)) : '';
    document.getElementById('recipe').insertAdjacentHTML('beforeend',
      `<h3 style="margin:1.4rem 0 .3rem">Source methods <span style="color:var(--muted);font-weight:400">(every grounded value highlighted in context${lic})</span></h3>
       <div class="apa-source">${highlight(src.methods_text, quotes)}</div>`);
  }

  // Related protocols: same organoid type, best-grounded first, excluding current
  if (p.organoid_type && p.organoid_type !== 'other') {
    try {
      const pool = await j(`/atlas/protocols.json?organoid_type__exact=${encodeURIComponent(p.organoid_type)}&_size=8&_shape=array&_sort_desc=grounding_rate`);
      const related = pool.filter(r => r.pmcid !== pmcid).slice(0, 5);
      if (related.length) {
        const cards = related.map(r =>
          `<a class="apa-rel" href="/atlas/protocols/${encodeURIComponent(r.pmcid)}">`
          + `<span class="apa-rel-a">${esc(r.first_author || r.pmcid)} ${esc(String(r.year||''))}</span>`
          + `<span class="apa-rel-m">${Math.round((r.grounding_rate||0)*100)}% grounded · ${r.n_signaling_factors||0} factors</span>`
          + `</a>`
        ).join('');
        document.getElementById('recipe').insertAdjacentHTML('beforeend',
          `<h3 style="margin:1.5rem 0 .4rem">Other ${esc(p.organoid_type)} protocols</h3>`
          + `<div class="apa-rel-row">${cards}</div>`);
      }
    } catch(_) {}
  }
})();
</script>
{% endblock %}
